<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discore</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link href="libs/mdb/css/mdb.dark.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/soundboard.css">
    <script>window.$ = window.jQuery = require('jquery');</script>
    <script type="text/javascript" src="libs/mdb/js/mdb.min.js" defer></script>
    <script src="js/scripts.js" defer></script>
    <script src="js/soundboard.js" defer></script>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li id="navMenu" class="nav-item"><div class="icon"></div></li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li id="navMinimize" class="nav-item"><div class="icon"></div></li>
                <li id="navMaximize" class="nav-item"><div class="icon"></div></li>
                <li id="navClose" class="nav-item"><div class="icon"></div></li>
            </ul>
        </div>
    </div>
</nav>
<div class="nav-spacer"></div>
<div id="tableContainer">
    <table id="soundboard" class="table table-borderless">
        <tbody>
        </tbody>
    </table>
</div>
<div id="player" class="container-fluid fixed-bottom">
    <div class="row justify-content-center">
        <div class="flex-center col-lg-auto">
            <div id="leftBtns">
                <button id="playPauseBtn" class="btn btn-floating btn-green" role="button" disabled><i class="fas fa-play"></i></button>
                <button id="stopBtn" class="btn btn-floating btn-red" role="button" disabled><i class="fas fa-stop"></i></button>
                <button id="prevBtn" class="btn btn-floating btn-blue" role="button" disabled><i class="fas fa-step-backward"></i></button>
                <button id="nextBtn" class="btn btn-floating btn-blue" role="button" disabled><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
        <div class="flex-center col-lg-8">
            <div class="external">
                <div class="slider">
                    <label for="volume" class="form-label range-label">Volume</label>
                    <div class="slider-container">
                        <div class="range">
                            <input type="range" class="form-range" id="volume" min="0" max="100" step="1" value="50">
                        </div>
                        <div class="progress">
                            <div id="volumeProgress" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
                <div class="slider">
                    <label for="track" class="form-label range-label">Track</label>
                    <div class="slider-container">
                        <div id="trackRange" class="range">
                            <input type="range" class="form-range" id="track" min="0" max="1000" step="1000" value="0">
                        </div>
                        <div class="progress">
                            <div id="trackProgress" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
                <div id="trackContainer">
                    <p id="trackName">&nbsp;</p>
                </div>
            </div>
        </div>
        <div class="flex-center col-lg-auto">
            <div id="rightBtns">
                <button id="playlistBtn" class="btn btn-floating btn-blue" role="button" disabled><i class="fas fa-list-ul"></i></button>
                <button id="playNowBtn" class="btn btn-floating btn-blue" role="button"><i class="fas fa-music"></i></button>
            </div>
        </div>
        <div class="flex-center col-lg-auto">
            <div id="tableSize">
                <label for="rows">Rows</label>
                <div class="number-spinner">
                    <span data-for="rows" class="spinner-element next"><i class="fas fa-plus"></i></span>
                    <span data-for="rows" class="spinner-element prev"><i class="fas fa-minus"></i></span>
                    <input id="rows" type="number" class="number-input num-input-spinner" value="8" min="1" />
                </div>
                <label for="cols">Columns</label>
                <div class="number-spinner">
                    <span data-for="cols" class="spinner-element next"><i class="fas fa-plus"></i></span>
                    <span data-for="cols" class="spinner-element prev"><i class="fas fa-minus"></i></span>
                    <input id="cols" type="number" class="number-input num-input-spinner" value="10" min="1" />
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
