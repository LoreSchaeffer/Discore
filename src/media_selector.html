<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discore</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link href="libs/mdb/css/mdb.dark.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/media_selector.css">
    <script>window.$ = window.jQuery = require('jquery');</script>
    <script type="text/javascript" src="libs/mdb/js/mdb.min.js" defer></script>
    <script src="js/scripts.js" defer></script>
    <script src="js/media_selector.js" defer></script>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li id="navMenu" class="nav-item"><div class="icon"></div></li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li id="navMinimize" class="nav-item"><div class="icon"></div></li>
                <li id="navMaximize" class="nav-item disabled"><div class="icon"></div></li>
                <li id="navClose" class="nav-item"><div class="icon"></div></li>
            </ul>
        </div>
    </div>
</nav>
<div class="nav-spacer"></div>
<div id="mainContainer" class="container-fluid">
    <div id="srcContainer">
        <div id="srcInputContainer" class="form-outline mb-2">
            <input type="text" id="src" class="form-control" />
            <input type="file" id="srcFile" accept="audio/*,video/*">
            <label class="form-label" for="src">Source</label>
        </div>
        <button id="dirBtn" class="btn btn-floating btn-blue" role="button"><i class="fas fa-folder-open"></i></button>
    </div>
    <div id="btnContainer">
        <button id="addToPlaylistBtn" class="btn btn-primary btn-blue">Add To Playlist</button>
        <button id="playNowBtn" class="btn btn-primary btn-blue">Play Now</button>
    </div>
</div>
</body>
</html>
